<!DOCTYPE html>
<!-- saved from url=(0027)file:///D:/_S/Hclassic.html -->
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	

	<!-- <title>Hildebrand media player</title> -->
	<title>HC</title>

	<link rel="stylesheet" href="./HC_files/H.css">

	<script src="./HC_files/H.js" defer=""></script>
</head>


<body onload="loadMedium(&#39;https://www.learningcontainer.com/wp-content/uploads/2020/05/sample-mp4-file.mp4&#39;);">
<!-- <body onload = "loadMedium('S.mp3');"> -->
<!-- <body onload = "loadMedium('https://file-examples.com/wp-content/storage/2017/11/file_example_MP3_700KB.mp3');"> -->

	<h1 id="headerSection" style="display: none">
		<table><tbody><tr style="border-style: solid">
		<td id="letterLogo" onclick="openS();" onmouseover="showAbout();" onmouseout="hideAbout();" style="cursor: pointer; width: 20%; border: none; text-align: left; display: block;">HC</td>
		<td id="aboutTitle" style="width: 80%; border: none; text-align: center">
			Let's get started.</td>
		</tr></tbody></table>
	</h1>

	<div id="headerDisplay" style="text-align: right;">
		<button id="concise" style="display: none" onclick="hideHeaderSection();" accesskey="c"><u>C</u>oncise</button>
		<button id="verbose" onclick="showHeaderSection();" accesskey="v"><u>V</u>erbose</button>
	</div>

    <!-- Top Window -->

	<h3>Media classic</h3>

	<p class="centred">
		
	  <span style="display: none">
		<label>Volume: </label>
		<button class="forward" id="bVolumeUp" onclick="changeVolume(0.1);" accesskey="9">
				+<u>/9</u></button>
		<button class="back" id="bVolumeDown" onclick="changeVolume(-0.1);" accesskey="0">
				-<u>/0</u></button>
	  </span>

		<label>Medium: </label>
		<input type="file" id="mediumFileInput" accept="audio/*,video/*" onchange="loadLocalMedium(this);">
		<label for="mediumFileInput" accesskey="u"><u>U</u>pload medium</label>
		<label id="currentMedium">https://www.learningcontainer.com/wp-content/uploads/2020/05/sample-mp4-file.mp4</label>
	</p>
	

	<span style="display: none">

	<div class="centred">

	  <span id="shortCutLabels">
	        </span><table class="center-table">
	    <tbody><tr>
		<td><label class="shortCut" id="SC1">Alt + 1</label>  </td>
	        <td><label class="shortCut" id="SC2">Alt + 2</label> </td>
	        <td><label class="shortCut" id="SC3">Alt + 3</label> </td>
	        <td><label class="shortCut" id="SC4">Alt + 4</label></td>
	        <td><label class="shortCut" id="SC5">Alt + 5</label>     </td>
	        <td><label class="shortCut" id="SC6">Alt + 6</label>    </td>
	        <td><label class="shortCut" id="SC7">Alt + 7</label>   </td>
	        <td><label class="shortCut" id="SC8">Alt + 8</label>   </td>
		
	    </tr>
	    <tr style="cursor: pointer" onmouseover="showShortCutLabels();" onmouseout="hideShortCutLabels();">
	      <!-- <span > -->
	        <td><button class="forward" id="bForward1s" onclick="advance(1);" accesskey="1">+ 1 s</button></td>
	        <td><button class="forward" id="bForward10s" onclick="advance(10);" accesskey="2">+ 10 s</button></td>
	        <td><button class="forward" id="bForward60s" onclick="advance(60);" accesskey="3">+ 1 m</button></td>
	        <td><button class="forward" id="bForward600s" onclick="advance(600);" accesskey="4">+ 10 m</button></td>
	        <td><button class="back" id="bBack1s" onclick="advance(-1);" accesskey="5">- 1 s</button></td>
	        <td><button class="back" id="bBack10s" onclick="advance(-10);" accesskey="6">- 10 s</button></td>
	        <td><button class="back" id="bBack100s" onclick="advance(-60);" accesskey="7">- 1 m</button></td>
	        <td><button class="back" id="bBack600s" onclick="advance(-600);" accesskey="8">- 10 m</button></td>
	      <!-- </span> -->
	    </tr>
	  </tbody></table>
	</div>



	<p></p>

	<div class="centred">
		<input id="minutes" type="text" size="2" style="width: 2ch" pattern="[0-9]+" maxlength="2" placeholder="Enter minutes." value="0">
		<label>m</label>
		<input id="seconds" type="text" size="2" style="width: 2ch" pattern="[0-9]+" maxlength="2" placeholder="Enter seconds." value="1">
		<label>s</label>
	        <button class="absoluteTimePoint" id="bGoNumber" onclick="setCurrentTime();" accesskey="G">
			<u>G</u>o to</button>
	        <button class="forward" id="bForwardNumber" onclick="advanceNumber(1);" accesskey="W">
			For<u>w</u>ard</button>
	        <button class="back" id="bBackNumber" onclick="advanceNumber(-1);" accesskey="B"><u>B</u>ack</button>
	        <button class="absoluteTimePoint" id="bResetToStart" onclick="resetToStart();" accesskey="R">
			<u>R</u>eset</button>
	        <button class="play" id="bPlay" onclick="playMedium();" accesskey="P"><u>P</u> l a y</button>
	        <button class="pause" id="bPause" onclick="pauseMedium();" accesskey="A">P<u>a</u>use</button>
	</div>

	</span>


	<!-- Bottom Window -->
	<div id="bottom"> <!-- class = "player" -->
		<video controls="" id="mediaPlayer" src="https://www.learningcontainer.com/wp-content/uploads/2020/05/sample-mp4-file.mp4">
			<source src="H.mp4" type="video/mp4">
    			Your browser does not support the video tag.#
		</video>
        	<!-- <audio id="mediaPlayer" controls></audio> -->
	</div>






</body></html>
